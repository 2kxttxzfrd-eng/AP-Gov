<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP Government Daily Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen active">
      <div class="hero">
        <div class="logo">🏛️</div>
        <h1>AP Government<br /><span>Daily Practice</span></h1>
        <p class="subtitle">20 questions · Timed · Track your progress</p>
      </div>
      <div class="streak-banner" id="streak-banner"></div>
      <div class="home-buttons">
        <button class="btn btn-primary" id="start-btn">Start Today's Practice</button>
        <button class="btn btn-secondary" id="progress-btn">📊 View Progress</button>
      </div>
      <div class="today-status" id="today-status"></div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="screen">
      <div class="quiz-header">
        <div class="quiz-info">
          <span id="question-counter">Question 1 / 20</span>
          <span id="timer">⏱ 00:00</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="quiz-progress-bar"></div>
        </div>
      </div>
      <div class="question-card" id="question-card">
        <div class="unit-badge" id="unit-badge"></div>
        <p class="question-text" id="question-text"></p>
        <div class="options" id="options"></div>
      </div>
      <div class="quiz-nav">
        <button class="btn btn-outline" id="prev-btn" disabled>← Previous</button>
        <button class="btn btn-primary" id="next-btn">Next →</button>
        <button class="btn btn-submit" id="submit-btn" style="display:none">Submit Answers ✓</button>
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
      <div class="results-header">
        <h2>Practice Complete! 🎉</h2>
        <div class="score-circle" id="score-circle">
          <span class="score-number" id="score-number">0</span>
          <span class="score-label">/ 20</span>
        </div>
        <p class="score-percent" id="score-percent"></p>
        <p class="score-time" id="score-time"></p>
      </div>
      <div class="results-breakdown">
        <h3>Unit Breakdown</h3>
        <div id="unit-breakdown"></div>
      </div>
      <div class="results-review">
        <h3>Review Answers</h3>
        <div id="review-list"></div>
      </div>
      <div class="results-actions">
        <button class="btn btn-primary" id="home-btn">🏠 Back to Home</button>
        <button class="btn btn-secondary" id="retry-btn">🔄 Practice Again</button>
      </div>
    </div>

    <!-- PROGRESS SCREEN -->
    <div id="progress-screen" class="screen">
      <div class="progress-header">
        <button class="btn btn-outline btn-sm" id="back-home-btn">← Back</button>
        <h2>📊 Your Progress</h2>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total-days">0</div>
          <div class="stat-label">Days Practiced</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-avg-score">0%</div>
          <div class="stat-label">Average Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-best-score">0%</div>
          <div class="stat-label">Best Score</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">Day Streak 🔥</div>
        </div>
      </div>
      <div class="progress-section">
        <h3>Unit Performance</h3>
        <div id="unit-performance"></div>
      </div>
      <div class="progress-section">
        <h3>Daily History</h3>
        <div class="calendar-heatmap" id="calendar-heatmap"></div>
        <div id="history-list"></div>
      </div>
      <div class="progress-section">
        <button class="btn btn-danger btn-sm" id="clear-data-btn">🗑️ Clear All Data</button>
      </div>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
